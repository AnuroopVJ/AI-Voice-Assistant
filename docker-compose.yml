version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind "0.0.0.0"
    ports:
      - "7880:7880"
      - "7881:7881"
    networks:
      - agent_network

  agent:
    build:
      context: .
    command: python agents.py
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
    depends_on:
      - livekit
    volumes:
      - ./dbs:/workspaces/Kyle_AI_Voice_Assistant_RT/dbs
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge
